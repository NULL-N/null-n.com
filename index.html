<body data-scene="a">

  <!-- ========== CURSOR ========== -->
  <div class="cursor-dot" aria-hidden="true"></div>
  <div class="cursor-ring" aria-hidden="true"></div>

  <!-- ========== NOISE OVERLAY ========== -->
  <svg class="noise-svg" aria-hidden="true">
    <filter id="noiseFilter">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
    </filter>
    <rect width="100%" height="100%" filter="url(#noiseFilter)"/>
  </svg>

  <!-- ========== AUDIO ========== -->
  <button class="audio-ctrl" id="audio-btn" aria-label="Toggle music" data-magnetic data-no-scene-tap>
    <canvas class="audio-wave" id="audio-wave"></canvas>
  </button>

  <!-- ========== CANVAS ========== -->
  <canvas id="bg-canvas" aria-hidden="true"></canvas>

  <!-- ========== SCENE TOGGLE ========== -->
  <nav class="scene-toggle" aria-label="Scene" data-no-scene-tap>
    <button type="button" data-scene-target="a" aria-pressed="true" data-magnetic>A</button>
    <button type="button" data-scene-target="b" aria-pressed="false" data-magnetic>B</button>
  </nav>

  <!-- ========== SCENE A — hero + playground (current) ========== -->
  <main class="scene scene-a" id="scene-a">
    <section id="hero" class="section hero">
      <div class="hero-content">
        <h1 class="hero-title glitch" data-text="NULL-N">NULL-N</h1>
        <div class="hero-prompt">
          <span class="prompt-symbol">&gt;</span>
          <span class="prompt-text" id="typed-text"></span>
          <span class="prompt-cursor">_</span>
        </div>
      </div>
    </section>

    <!-- Playground constellation — initially invisible, revealed after the
         visitor's first interaction (audio engages and stars fade in). -->
    <div class="b-node" id="node-drums"     style="color:#fff0e0"></div>
    <div class="b-node" id="node-bass"      style="color:#e0e8ff"></div>
    <div class="b-node" id="node-main-gt"   style="color:#fff5d8"></div>
    <div class="b-node" id="node-synth-gt"  style="color:#e8f8ec"></div>
    <div class="b-node" id="node-synth-pad" style="color:#f0e0f8"></div>

    <div class="b-crosshair" aria-hidden="true"></div>
    <div class="b-lock-marker" aria-hidden="true"></div>

  </main>

  <!-- ========== SCENE B — editorial "studio brief" ========== -->
  <main class="scene scene-b" id="scene-b" hidden>
    <header class="b-nav">
      <span class="b-logo">NULL-N</span>
      <span class="b-status">
        <span class="b-status-dot" aria-hidden="true"></span>
        <span>Tokyo&nbsp;<span id="b-time">—</span>&nbsp;JST</span>
      </span>
    </header>

    <!-- Live 1px audio-reactive waveform under nav -->
    <canvas class="b-wave" id="b-wave" aria-hidden="true"></canvas>

    <section class="b-hero">
      <p class="b-eyebrow">STUDIO · NULL-N</p>
      <h1 class="b-headline">
        Sound <span class="b-x">×</span> AI<br>
        <span class="b-x">×</span> Engineering<span class="b-period">.</span>
      </h1>
      <p class="b-sub">創造的な技術と、続く伴走を。</p>
    </section>

    <section class="b-services">
      <article class="b-service">
        <h3>Sound</h3>
        <p>楽曲制作と声の表現。</p>
      </article>
      <article class="b-service">
        <h3>AI</h3>
        <p>感情に寄り添う音声 AI を、ゼロから形に。<br>試作から運用まで、伴走します。</p>
      </article>
      <article class="b-service">
        <h3>Engineering</h3>
        <p>音・光・動きを、Web で形に。<br>納品で終わらず、伴走します。</p>
      </article>
    </section>

    <section class="b-capabilities" id="capabilities">
      <h2>Direction</h2>
      <ul class="b-stack">
        <li>JavaScript</li>
        <li>TypeScript</li>
        <li>Node.js</li>
        <li>Python</li>
        <li>SQL</li>
      </ul>
    </section>

    <footer class="b-footer">
      <span class="b-now-playing">
        <span class="b-pulse" aria-hidden="true"></span>
        <span>©NULL-N Original</span>
      </span>
    </footer>
  </main>

  <!-- ========== NOSCRIPT ========== -->
  <noscript>
    <style>.hero-title{opacity:1;transform:none}.hero-prompt{opacity:1;transform:none}.prompt-cursor{animation:none}</style>
  </noscript>

  <!-- ========== SCRIPTS ========== -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="js/main.js" defer></script>
